name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm install

      - name: Lint
        run: npx eslint src server scripts --ext .ts,.js || true

      - name: Security audit
        run: npm audit --audit-level=high || true

      - run: npm run build

      - run: npm test

      - run: npm run test:install
